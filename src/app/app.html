<div class="min-h-screen bg-gray-100 dark:bg-slate-900 transition-colors duration-300 flex items-center justify-center py-10 px-4">
  
  <div class="bg-white dark:bg-slate-800 p-8 rounded-xl shadow-2xl w-full max-w-lg transition-colors duration-300">
    
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold text-gray-800 dark:text-white">Ma To-Do</h1>
      
      <div class="flex items-center gap-3">
        <button (click)="basculerDarkMode()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-slate-700 transition">
          @if (darkMode()) { ☀️ } @else { 🌙 }
        </button>

        @if (user$ | async; as user) {
          <img [src]="user.photoURL" class="w-8 h-8 rounded-full border border-gray-300">
          <button (click)="logout()" class="text-xs text-red-500 hover:underline">Sortir</button>
        }
      </div>
    </div>

    @if (user$ | async) {
      
      <div class="flex flex-col gap-3 mb-6">
        
        <div class="flex gap-2">
          <input #champSaisie 
                 type="text" 
                 placeholder="Nouvelle tâche..."
                 class="flex-1 border border-gray-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                 (keydown.enter)="ajouterTache(champSaisie.value); champSaisie.value = ''">
          <button (click)="ajouterTache(champSaisie.value); champSaisie.value = ''"
                  class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">
            +
          </button>
        </div>

        <div class="flex justify-end">
           <button (click)="basculerTri()" class="text-sm text-gray-500 dark:text-gray-400 hover:text-blue-500 flex items-center gap-1">
             <span class="text-xs uppercase font-bold tracking-wider">Trier : {{ ordreTri() === 'recent' ? 'Plus récents' : 'Plus anciens' }}</span>
             <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4" [class.rotate-180]="ordreTri() === 'ancien'">
               <path stroke-linecap="round" stroke-linejoin="round" d="M3 4.5h14.25M3 9h9.75M3 13.5h9.75m4.5-4.5v12m0 0-3.75-3.75M17.25 21 21 17.25" />
             </svg>
           </button>
        </div>
      </div>

      @if (chargement()) {
        <div class="flex justify-center py-10">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        </div>
      } 
      @else {
        <div class="space-y-3">
          @for (t of taches(); track t.id) {
            <app-tache 
              [tache]="t" 
              (supprimer)="supprimerTache(t)" 
              (toggle)="basculerTache(t)">
            </app-tache>
          } @empty {
            <p class="text-center text-gray-400 mt-10 italic">Aucune tâche pour le moment.</p>
          }
        </div>
      }

    } @else {
      <div class="text-center py-10">
        <p class="text-gray-500 dark:text-gray-300 mb-4">Connecte-toi pour gérer tes tâches.</p>
        <button (click)="login()" 
                class="bg-white dark:bg-slate-700 dark:text-white border border-gray-300 dark:border-slate-600 font-bold py-2 px-4 rounded-lg shadow-sm hover:bg-gray-50 dark:hover:bg-slate-600 flex items-center justify-center gap-2 w-full transition">
          Continuer avec Google
        </button>
      </div>
    }

  </div>
</div>
