<div class="min-h-screen bg-gray-100 flex items-center justify-center py-10 px-4">
  <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-lg">
    
    <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">{{ title() }}</h1>

    <div class="flex gap-2 mb-6">
      <input #champSaisie 
             type="text" 
             placeholder="Nouvelle tâche..."
             class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
             (keydown.enter)="ajouterTache(champSaisie.value); champSaisie.value = ''">
      
      <button (click)="ajouterTache(champSaisie.value); champSaisie.value = ''"
              class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">
        Ajouter
      </button>
    </div>

    <div class="space-y-3">
      @for (t of taches(); track t.id) {
        <app-tache 
          [tache]="t" 
          (supprimer)="supprimerTache(t)" 
          (toggle)="basculerTache(t)">
        </app-tache>
      } @empty {
        <p class="text-center text-gray-400 mt-10">Rien à faire... 😴</p>
      }
    </div>

  </div>
</div>
